<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Koru Mockup — Long-press Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; width: 430px; height: 932px; overflow: hidden; }
  
  /* Chat background — real asset */
  .chat-screen {
    position: relative;
    width: 430px;
    height: 932px;
    background: #453f6a url("chat-bg.png") center top / cover no-repeat;
    overflow: hidden;
  }
  
  /* Back button */
  .back-btn {
    position: absolute;
    top: 18px;
    left: 16px;
    z-index: 30;
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  
  /* Chat content area */
  .chat-content {
    position: absolute;
    bottom: 120px;
    left: 0;
    right: 0;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  
  /* User bubble */
  .user-bubble {
    align-self: flex-end;
    max-width: 85%;
    background: #F0F4FF;
    color: #301C70;
    padding: 12px 16px 14px;
    border-radius: 22px;
    border-bottom-right-radius: 0;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.4;
    box-shadow: 0 10px 28px rgba(18,10,50,0.18);
  }
  
  /* Koru row: avatar + bubble */
  .koru-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  
  .koru-avatar {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 4px 12px rgba(18,10,50,0.15);
    flex-shrink: 0;
  }
  
  .koru-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .koru-bubble {
    flex: 1;
    background: #F8F4FA;
    color: #301C70;
    padding: 12px 16px 14px;
    border-radius: 22px;
    border-bottom-left-radius: 0;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.4;
    box-shadow: 0 10px 28px rgba(18,10,50,0.18);
  }
  
  .koru-bubble h3 {
    font-size: 18px;
    font-weight: 700;
    color: #523A9E;
    margin-bottom: 6px;
  }
  
  /* Composer */
  .composer {
    position: absolute;
    bottom: 24px;
    left: 20px;
    right: 20px;
    height: 64px;
    border-radius: 999px;
    background: #fff;
    padding: 8px;
    display: flex;
    align-items: center;
    box-shadow: 0 12px 32px rgba(18,10,50,0.22);
  }
  
  .composer-icon {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a89ad7;
  }
  
  .composer-field {
    flex: 1;
    height: 100%;
    margin: 0 8px;
    border: 1px solid #f0ebf8;
    border-radius: 999px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    color: #a89ad7;
    font-size: 15px;
    font-weight: 500;
  }
  
  .mic-btn {
    width: 48px;
    height: 48px;
    border-radius: 999px;
    background: #7c5ff6;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* === WHEEL OVERLAY === */
  .wheel-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: rgba(20, 16, 42, 0.7);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .wheel-container {
    position: relative;
    width: 320px;
    height: 320px;
  }
  
  /* Center hint */
  .wheel-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    border-radius: 999px;
    background: rgba(131, 99, 249, 0.3);
    border: 2px solid #8363F9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    z-index: 10;
  }
  
  .wheel-center .material-symbols-outlined {
    font-size: 28px;
    color: #c9b8ff;
  }
  
  .wheel-center span:last-child {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
    color: #c9b8ff;
  }
  
  /* Wheel options — radial positioning */
  .wheel-option {
    position: absolute;
    width: 88px;
    height: 88px;
    border-radius: 999px;
    background: rgba(34, 28, 74, 0.95);
    border: 2px solid rgba(131, 99, 249, 0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #f0eaff;
    transition: all 0.2s;
  }
  
  .wheel-option .material-symbols-outlined {
    font-size: 28px;
    color: #8363F9;
    margin-bottom: 2px;
  }
  
  .wheel-option span.label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  
  /* Highlighted option (finger is on it) */
  .wheel-option.active {
    background: #8363F9;
    border-color: #c9b8ff;
    transform: scale(1.15);
    box-shadow: 0 0 30px rgba(131, 99, 249, 0.6);
  }
  
  .wheel-option.active .material-symbols-outlined {
    color: #fff;
  }
  
  /* Positions: 4 options at 12, 3, 6, 9 o'clock */
  .wheel-option.top    { top: 0; left: 50%; transform: translateX(-50%); }
  .wheel-option.right  { top: 50%; right: 0; transform: translateY(-50%); }
  .wheel-option.bottom { bottom: 0; left: 50%; transform: translateX(-50%); }
  .wheel-option.left   { top: 50%; left: 0; transform: translateY(-50%); }
  
  .wheel-option.top.active    { transform: translateX(-50%) scale(1.15); }
  .wheel-option.right.active  { transform: translateY(-50%) scale(1.15); }
  .wheel-option.bottom.active { transform: translateX(-50%) scale(1.15); }
  .wheel-option.left.active   { transform: translateY(-50%) scale(1.15); }
  
  /* Hint text above wheel */
  .wheel-hint {
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    color: #c9b8ff;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
  }
  
  .wheel-hint .material-symbols-outlined {
    font-size: 16px;
    vertical-align: middle;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div class="chat-screen">
  <!-- Back button -->
  <button class="back-btn">
    <span class="material-symbols-outlined">chevron_left</span>
  </button>
  
  <!-- Chat content (real bubbles) -->
  <div class="chat-content">
    <div class="user-bubble">como salio España ayer</div>
    <div class="koru-row">
      <div class="koru-avatar"><img src="avatar-chat.png" alt="Koru"></div>
      <div class="koru-bubble">
        <h3>¡Listo, Juan! ⚽</h3>
        <p>España le ganó 2-1 a Bélgica ayer, cuartos del Mundial.</p>
      </div>
    </div>
  </div>
  
  <!-- Composer -->
  <div class="composer">
    <div class="composer-icon"><span class="material-symbols-outlined">eco</span></div>
    <div class="composer-field">Habla con Koru...</div>
    <div class="mic-btn"><span class="material-symbols-outlined">arrow_upward</span></div>
  </div>
  
  <!-- === WHEEL OVERLAY (long-press active) === -->
  <div class="wheel-overlay">
    <div class="wheel-container">
      <!-- Hint -->
      <div class="wheel-hint">
        <span class="material-symbols-outlined">touch_app</span>
        Mantené presionado y desliza
      </div>
      
      <!-- Center -->
      <div class="wheel-center">
        <span class="material-symbols-outlined">touch_app</span>
        <span>Wheel</span>
      </div>
      
      <!-- 4 radial options -->
      <div class="wheel-option top">
        <span class="material-symbols-outlined">neurology</span>
        <span class="label">Memoria</span>
      </div>
      <div class="wheel-option right active">
        <span class="material-symbols-outlined">history</span>
        <span class="label">Historial</span>
      </div>
      <div class="wheel-option bottom">
        <span class="material-symbols-outlined">settings</span>
        <span class="label">Ajustes</span>
      </div>
      <div class="wheel-option left">
        <span class="material-symbols-outlined">close</span>
        <span class="label">Cerrar</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
