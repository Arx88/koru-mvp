<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Koru Mockup — Sugerencias de temas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; width: 430px; height: 932px; overflow: hidden; }
  
  .chat-screen {
    position: relative;
    width: 430px;
    height: 932px;
    background: #453f6a url("chat-bg.png") center top / cover no-repeat;
    overflow: hidden;
  }
  
  .back-btn {
    position: absolute;
    top: 18px;
    left: 16px;
    z-index: 30;
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  
  /* === HISTORY SUGGESTION PILL (top) === */
  .suggestion-bar {
    position: absolute;
    top: 70px;
    left: 16px;
    right: 16px;
    z-index: 20;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .suggestion-bar::-webkit-scrollbar { display: none; }
  
  .suggestion-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(131, 99, 249, 0.25);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(201, 184, 255, 0.4);
    color: #f0eaff;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  
  .suggestion-pill .material-symbols-outlined {
    font-size: 14px;
    color: #c9b8ff;
  }
  
  .suggestion-pill .topic {
    color: #6ee7b7;
    font-weight: 700;
  }
  
  /* Chat content */
  .chat-content {
    position: absolute;
    bottom: 120px;
    left: 0;
    right: 0;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  
  .user-bubble {
    align-self: flex-end;
    max-width: 85%;
    background: #F0F4FF;
    color: #301C70;
    padding: 12px 16px 14px;
    border-radius: 22px;
    border-bottom-right-radius: 0;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.4;
    box-shadow: 0 10px 28px rgba(18,10,50,0.18);
  }
  
  .koru-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  
  .koru-avatar {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 4px 12px rgba(18,10,50,0.15);
    flex-shrink: 0;
  }
  
  .koru-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .koru-bubble {
    flex: 1;
    background: #F8F4FA;
    color: #301C70;
    padding: 12px 16px 14px;
    border-radius: 22px;
    border-bottom-left-radius: 0;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.4;
    box-shadow: 0 10px 28px rgba(18,10,50,0.18);
  }
  
  .koru-bubble h3 {
    font-size: 18px;
    font-weight: 700;
    color: #523A9E;
    margin-bottom: 6px;
  }
  
  /* Composer */
  .composer {
    position: absolute;
    bottom: 24px;
    left: 20px;
    right: 20px;
    height: 64px;
    border-radius: 999px;
    background: #fff;
    padding: 8px;
    display: flex;
    align-items: center;
    box-shadow: 0 12px 32px rgba(18,10,50,0.22);
  }
  
  .composer-icon {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a89ad7;
  }
  
  .composer-field {
    flex: 1;
    height: 100%;
    margin: 0 8px;
    border: 1px solid #f0ebf8;
    border-radius: 999px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    color: #a89ad7;
    font-size: 15px;
    font-weight: 500;
  }
  
  .mic-btn {
    width: 48px;
    height: 48px;
    border-radius: 999px;
    background: #7c5ff6;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="chat-screen">
  <button class="back-btn">
    <span class="material-symbols-outlined">chevron_left</span>
  </button>
  
  <!-- === SUGGESTION PILLS (temas relacionados) === -->
  <div class="suggestion-bar">
    <div class="suggestion-pill">
      <span class="material-symbols-outlined">history</span>
      Antes hablamos de <span class="topic">España vs Bélgica</span>
    </div>
    <div class="suggestion-pill">
      <span class="material-symbols-outlined">cloud</span>
      Clima en <span class="topic">Madrid</span>
    </div>
    <div class="suggestion-pill">
      <span class="material-symbols-outlined">savings</span>
      <span class="topic">Café $2.000</span>
    </div>
  </div>
  
  <!-- Chat content -->
  <div class="chat-content">
    <div class="user-bubble">como le fue a Argentina</div>
    <div class="koru-row">
      <div class="koru-avatar"><img src="avatar-chat.png" alt="Koru"></div>
      <div class="koru-bubble">
        <h3>Argentina juega hoy 🇦🇷</h3>
        <p>Argentina vs Suiza a la 1:00 AM. Todavía no empezó. ¿Te interesa el resultado cuando termine?</p>
      </div>
    </div>
  </div>
  
  <!-- Composer -->
  <div class="composer">
    <div class="composer-icon"><span class="material-symbols-outlined">eco</span></div>
    <div class="composer-field">Habla con Koru...</div>
    <div class="mic-btn"><span class="material-symbols-outlined">arrow_upward</span></div>
  </div>
</div>
</body>
</html>
