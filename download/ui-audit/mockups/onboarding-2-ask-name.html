<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Koru — Onboarding paso 2: Koru pregunta nombre</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; width: 430px; height: 932px; overflow: hidden; }
  .chat-screen { position: relative; width: 430px; height: 932px; background: #453f6a url("chat-bg.png") center top / cover no-repeat; overflow: hidden; }
  .back-btn { position: absolute; top: 18px; left: 16px; z-index: 30; width: 44px; height: 44px; border-radius: 999px; background: rgba(255,255,255,0.22); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.35); display: flex; align-items: center; justify-content: center; color: #fff; }
  .chat-content { position: absolute; bottom: 120px; left: 0; right: 0; padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
  .user-bubble { align-self: flex-end; max-width: 85%; background: #F0F4FF; color: #301C70; padding: 12px 16px 14px; border-radius: 22px; border-bottom-right-radius: 0; font-size: 16px; font-weight: 500; line-height: 1.4; box-shadow: 0 10px 28px rgba(18,10,50,0.18); }
  .koru-row { display: flex; align-items: flex-end; gap: 10px; }
  .koru-avatar { width: 56px; height: 56px; border-radius: 999px; overflow: hidden; background: #fff; box-shadow: 0 4px 12px rgba(18,10,50,0.15); flex-shrink: 0; }
  .koru-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .koru-bubble { flex: 1; background: #F8F4FA; color: #301C70; padding: 14px 16px; border-radius: 22px; border-bottom-left-radius: 0; font-size: 16px; font-weight: 500; line-height: 1.4; box-shadow: 0 10px 28px rgba(18,10,50,0.18); }
  .koru-bubble h3 { font-size: 18px; font-weight: 700; color: #523A9E; margin-bottom: 6px; }
  .composer { position: absolute; bottom: 24px; left: 20px; right: 20px; height: 64px; border-radius: 999px; background: #fff; padding: 8px; display: flex; align-items: center; box-shadow: 0 12px 32px rgba(18,10,50,0.22); }
  .composer-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; color: #a89ad7; }
  .composer-field { flex: 1; height: 100%; margin: 0 8px; border: 1px solid #f0ebf8; border-radius: 999px; padding: 0 16px; display: flex; align-items: center; color: #a89ad7; font-size: 15px; font-weight: 500; }
  .mic-btn { width: 48px; height: 48px; border-radius: 999px; background: #7c5ff6; color: #fff; display: flex; align-items: center; justify-content: center; }
  .typing-dots { display: flex; gap: 4px; padding: 8px 0; }
  .typing-dots span { width: 8px; height: 8px; border-radius: 999px; background: #a89ad7; animation: pulse 1.4s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="chat-screen">
  <button class="back-btn"><span class="material-symbols-outlined">chevron_left</span></button>
  <div class="chat-content">
    <!-- User tocó chip "¿Qué tiempo hace?" -->
    <div class="user-bubble">¿qué tiempo hace en Madrid?</div>
    <!-- Koru respondió con el clima -->
    <div class="koru-row">
      <div class="koru-avatar"><img src="avatar-chat.png" alt="Koru"></div>
      <div class="koru-bubble">
        <p>En Madrid hace 29°C ahora, con máximas de 32 y mínimas de 21. Viento a 15 km/h y 0% de lluvia. Día para salir liviano.</p>
      </div>
    </div>
    <!-- Koru pregunta el nombre conversacionalmente -->
    <div class="koru-row">
      <div class="koru-avatar"><img src="avatar-chat.png" alt="Koru"></div>
      <div class="koru-bubble">
        <h3>Por cierto, ¿cómo te llamo? 😊</h3>
        <p>Así puedo personalizar mis respuestas y recordarte cosas más fácil.</p>
      </div>
    </div>
  </div>
  <div class="composer">
    <div class="composer-icon"><span class="material-symbols-outlined">eco</span></div>
    <div class="composer-field">Escribí tu nombre...</div>
    <div class="mic-btn"><span class="material-symbols-outlined">arrow_upward</span></div>
  </div>
</div>
</body>
</html>
