<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Koru — ¿Cuál DeepHungry?</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#fcfcfa; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:#1f2933; -webkit-font-smoothing:antialiased; }
  .page { max-width:520px; margin:0 auto; padding:24px 16px 60px; }
  h1 { text-align:center; font-size:20px; font-weight:850; margin:0 0 6px; }
  .sub { text-align:center; font-size:12px; color:#727d8a; margin:0 0 28px; }
  .option { margin:0 0 28px; }
  .opt-label { display:flex; align-items:baseline; gap:10px; margin:0 0 10px; padding:0 2px; }
  .opt-num { font-size:13px; font-weight:850; color:#4a9e4f; }
  .opt-name { font-size:15px; font-weight:800; }
  .opt-frame { background:#fff; border:1px solid #e5e7eb; border-radius:16px; overflow:hidden; box-shadow:0 6px 20px rgba(31,41,51,0.05); }
  .opt-frame img { display:block; width:100%; height:auto; }
  .hint { text-align:center; font-size:12px; color:#727d8a; padding:16px; background:#f8f9fa; border-radius:14px; margin-top:8px; }
  .hint b { color:#1f2933; }
</style>
</head>
<body>
<div class="page">
  <h1>¿Cuál es el DeepHungry correcto?</h1>
  <p class="sub">Hay 4 variantes con ese nombre. Decime el número de la que querés.</p>

  <div class="option">
    <div class="opt-label"><span class="opt-num">1</span><span class="opt-name">Enfoque Editorial</span></div>
    <div class="opt-frame"><img src="/dh-1-editorial.png" alt="editorial" /></div>
  </div>

  <div class="option">
    <div class="opt-label"><span class="opt-num">2</span><span class="opt-name">Minimalismo Calmado</span></div>
    <div class="opt-frame"><img src="/dh-2-minimal.png" alt="minimal" /></div>
  </div>

  <div class="option">
    <div class="opt-label"><span class="opt-num">3</span><span class="opt-name">Grilla Bento Visual</span></div>
    <div class="opt-frame"><img src="/dh-3-bento.png" alt="bento" /></div>
  </div>

  <div class="option">
    <div class="opt-label"><span class="opt-num">4</span><span class="opt-name">Síntesis Comparativa</span></div>
    <div class="opt-frame"><img src="/dh-4-comparativa.png" alt="comparativa" /></div>
  </div>

  <p class="hint">Decime <b>"la 2"</b>, <b>"la 3"</b>, etc. y bajo su HTML para replicarlo exacto.</p>
</div>
</body>
</html>
