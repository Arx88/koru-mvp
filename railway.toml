# Railway deployment config
# Deploy: railway up
# Or: railway link && railway deploy

[deploy]
startCommand = "node --max-old-space-size=512 server-bundle.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build && npx esbuild server/index.ts --bundle --platform=node --format=esm --outfile=server-bundle.mjs --external:z-ai-web-dev-sdk --external:playwright"

[env]
NODE_ENV = "production"
PORT = "3000"
